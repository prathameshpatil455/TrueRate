services:
  postgres:
    image: postgres:16-alpine
    container_name: truerate-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: truerate
      POSTGRES_PASSWORD: truerate_dev
      POSTGRES_DB: truerate
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truerate -d truerate"]
      interval: 5s
      timeout: 5s
      retries: 5
